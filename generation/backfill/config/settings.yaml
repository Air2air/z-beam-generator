domain: settings
source_file: data/settings/Settings.yaml
items_key: settings

generators:
  # Single multi-field generator - handles all text components in one pass
  - type: multi_field_text
    module: generation.backfill.universal_text_generator
    class: UniversalTextGenerator
    source_file: data/settings/Settings.yaml
    items_key: settings
    fields:
      - field: pageTitle
        component_type: pageTitle
      - field: pageDescription
        component_type: pageDescription
      - field: machineSettings
        component_type: machineSettings
      - field: relationships.operational.industryApplications._section.sectionDescription
        component_type: industryApplications
      - field: relationships.operational.preventionStrategies._section.sectionDescription
        component_type: preventionStrategies
      - field: relationships.operational.commonChallenges._section.sectionDescription
        component_type: commonChallenges
