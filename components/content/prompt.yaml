
template: |
  Using the provided frontmatter below as a primary guide and supplement with relevant scientific knowledge and contextual insights, generate a comprehensive {article_type} article about {subject} in the context of laser cleaning, written in the voice of a scientific expert from {country}.

  --- FRONTMATTER START ---
  {frontmatter}
  --- FRONTMATTER END ---

  Instructions:
  - Use the frontmatter as the primary guide to ensure accuracy and relevance, supplementing with relevant scientific knowledge, general principles of laser cleaning, or contextual insights that align with the frontmatter and enhance the article’s depth. Ensure supplemental information is credible, widely accepted, and consistent with the {subject} and laser cleaning context.
  - Organize the content with high flexibility, incorporating at least two structural deviations, such as combining related frontmatter sections (e.g., merging Applications and Advantages) and introducing at least one unique, culturally relevant subheading (e.g., ‘Why This Matters in {country}’) to reflect the writer’s perspective. Avoid directly mirroring frontmatter categories, ensuring all data is covered.
  - Write in the voice of a scientific expert from {country}, using English as specified ({second_language_status}) with linguistic and cultural nuances as outlined in the country-specific instructions below, with the intensity of these influences determined by the intensity value (1-5, default 3, where 1 means no voice change and 5 means strong adaptation).
  - To humanize the output and significantly reduce AI detection, incorporate the following to mimic natural human writing:
    - Use a mix of sentence lengths and structures, alternating between short, impactful sentences and longer, reflective ones to create a natural, varied rhythm (e.g., “The data shows 92% efficiency. This, we believe, could reshape cleaning practices.”).
    - Increase imperfections by including rephrasing in at least two paragraphs per section (e.g., “This is effective—no, it’s highly precise”), parenthetical asides in at least three-quarters of paragraphs (e.g., “(which, by the way, aligns with our goals)”), and a minor tangent in at least two sections (e.g., “This reminds us of {country}’s challenges”).
    - Use natural, culture-specific transitions and connectors (e.g., “So, let’s consider” for Californian, “In this regard” for Italian, “With respect” for Indonesian, “It is suggested” for Taiwanese) to replace formulaic academic phrases like “furthermore” or “in conclusion.”
    - Include at least three specific, frontmatter-driven cultural or personal reflections per article (e.g., “This is critical for Hsinchu Science Park” for Taiwan), appearing naturally across different sections to deeply ground the content in {country}’s context.
    - Vary tone dynamically within and across sections, ensuring each section includes at least one tone shift mixing enthusiasm, caution, and curiosity (e.g., “This is exciting, but we’ve gotta watch costs”) and emphasizing enthusiasm in applications, caution in limitations, and curiosity in conclusions, tailored to {country}’s cultural style.
    - Include minor qualifiers (e.g., “perhaps,” “likely,” “in some cases”) and parenthetical remarks (e.g., “(based on what the data suggests)”) to simulate human drafting habits.
    - Incorporate at least two rhetorical questions or conversational asides per major section (e.g., “Why does this matter? It’s about sustainability.”) tied to the frontmatter or {country}’s context to disrupt formal patterns.
    - Relax formality across all sections, including technical ones, with frequent conversational phrases, asides, or qualifiers (e.g., “This is a big deal for {country}”) in at least half of technical paragraphs, while maintaining precise terminology.
  - Ensure the article remains authoritative by grounding arguments in the frontmatter’s scientific evidence, supplemented by credible scientific knowledge, using precise terminology, and maintaining a logical flow, but allow stylistic variations to reflect human thought processes.
  - Integrate technical details into the narrative or a cohesive summary section, avoiding standalone bullet-point lists unless specified by the frontmatter. Accompany technical points with explanatory commentary or reflections (e.g., “The 1064 nm wavelength works because it targets silica, which aligns with {country}’s needs”).
  - Do not include any opening or closing discussion about the writing process, adherence to the prompt, or word count. The output must consist solely of the article content, written as if by a human expert from {country}.
  - Avoid complex idioms, slang, overly Westernized expressions, or stereotypical exaggerations to preserve cultural authenticity and scientific credibility.
  - Balance humanization with professionalism to avoid sounding overly casual or unconvincing.
  - {country_specific_instructions}
