template: |
  Generate comprehensive content about {subject} for a {article_type} article.
  
  Title: {title}
  Description: {description}
  Keywords: {keywords}
  
  Focus on providing accurate, detailed information about {subject}.
  
  Structure the content with appropriate headings and subheadings.
  Include information about:
  - Key characteristics and properties
  - Common applications and uses
  - Technical specifications (if relevant)
  - Advantages and limitations
  
  The content should be informative, well-structured, and suitable for readers
  seeking detailed information about {subject}.