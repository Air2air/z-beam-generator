schemaVersion: 1.0.0
chain:
  order:
    - descriptor
    - field_prompt
  notes: Descriptor prompt is reusable and brief; field prompt is domain-local text/non-text.
descriptor_prompts:
  synonymsIdentifiers: |
    Describe THIS ITEM'S canonical identifiers and aliases only.
  chemicalProperties: |
    Describe THIS ITEM'S chemical behavior only.
  physicalProperties: |
    Describe THIS ITEM'S physical characteristics only.
  page: |
    State what THIS ITEM is in concise context-setting terms only.
    Do NOT explain why it matters, operational impacts, recommendations, or workflow guidance.
  appearanceVariations: |
    Describe THIS ITEM'S appearance variations only.
  healthEffects: |
    Describe health and safety effects of THIS ITEM only.
  industryApplications: |
    Describe industry applications of THIS ITEM only.
  commonChallenges: |
    Describe common operational challenges for THIS ITEM only.
  preventionStrategies: |
    Describe prevention strategies for THIS ITEM only.
