schemaVersion: 1.0.0
prompt_type: text
required_variables:
- subject
- context
field_prompts:
  pageTitle:
    prompt: |-
      Describe the standout effects of {subject} in {context}. The title should be magnetically clickable yet intellectually honest, precise, evocative, and curiosity-driving.
  pageDescription:
    prompt: |-
      Describe the standout effects of {subject} in {context}, why it matters, and what users should expect in {context}. Draw from the deepest, most credible, multi-perspective research. Surface non-obvious insights, key debates, historical/scientific/cultural context, recent developments, and reasonable future implications. Feel authoritative, surprising, and elegantly concise. Avoid hype, clichés, and generic phrasing.
  contaminatedBy:
    sectionTitle: |-
      Write a concise Contaminated By heading for {subject} in {context}.
    sectionDescription: |-
      Describe the standout effects of {subject} contamination in {context}, why it matters, and what users should expect from contamination in {context}. Draw from the deepest, most credible, multi-perspective research. Surface non-obvious insights, key debates, historical/scientific/cultural context, recent developments, and reasonable future implications. Feel authoritative, surprising, and elegantly concise. Avoid hype, clichés, and generic phrasing.
  contaminatedByTitle:
    sectionTitle: |-
      Describe contaminatedByTitle considerations for {subject} in {context} within the applications domain.
    sectionDescription: |-
      Describe contaminatedByTitle considerations for {subject} in {context} within the applications domain.
  faq:
    sectionTitle: |-
      Write a concise FAQ heading for {subject} in {context}.
    sectionDescription: |-
      List a few commonly asked issues about {subject} relevant to {context} using thorough current web research.
  relatedMaterials:
    sectionTitle: |-
      Write a concise Related Materials heading for {subject} in {context}.
    sectionDescription: |-
      Describe relatedMaterials considerations for {subject} in {context} within the applications domain.
  relatedMaterialsTitle:
    sectionTitle: |-
      Describe relatedMaterialsTitle considerations for {subject} in {context} within the applications domain.
    sectionDescription: |-
      Describe relatedMaterialsTitle considerations for {subject} in {context} within the applications domain.
  relationships.discovery.relatedMaterials._section.sectionDescription:
    sectionDescription: |-
      Describe the unique differences of {subject} in {context}, why it matters, and what users should expect from contamination in {context}. Draw from the deepest, most credible, multi-perspective research. Surface non-obvious insights, key debates, historical/scientific/cultural context, recent developments, and reasonable future implications. Feel authoritative, surprising, and elegantly concise. Avoid hype, clichés, and generic phrasing.
  relationships.discovery.relatedMaterials._section.sectionTitle:
    sectionTitle: |-
      Describe relationships.discovery.relatedMaterials._section.sectionTitle considerations for {subject} in {context} within the applications domain.
  relationships.interactions.contaminatedBy._section.sectionDescription:
    sectionDescription: |-
      Describe relationships.interactions.contaminatedBy._section.sectionDescription considerations for {subject} in {context} within the applications domain.
  relationships.interactions.contaminatedBy._section.sectionTitle:
    sectionTitle: |-
      Describe relationships.interactions.contaminatedBy._section.sectionTitle considerations for {subject} in {context} within the applications domain.
