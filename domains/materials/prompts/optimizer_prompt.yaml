schemaVersion: 1.0.0
prompt_type: optimizer
prompt: |-
  Optimize the draft for clarity and concision without changing meaning.
  Remove redundancy, tighten phrasing, and keep the original tone.
  Do not add new facts or claims.
  Use the provided context to drill into subject-specific details and uncover non-obvious relationships.
  Vary sentence structure and length to avoid template-like cadence while staying within the prompt's constraints.
  Output plain text only.
