name: "Content Generator"
description: "Generates the main article content with proper structure and formatting."
template: |
  Generate detailed content for a {article_type} article about {subject} in laser cleaning contexts.
  
  Content requirements:
  - Target length: {min_words}-{max_words} words
  - Structure: {paragraphs} paragraphs spread across {num_sections} sections
  - Sections to include: {sections}
  - Style: Technical but accessible to non-specialists
  
  Use the following metadata from the frontmatter to enhance the content:
  {frontmatter_context}
  
  For each section, create a heading (##) followed by informative paragraphs that cover:
  
  {section_prompts}
  
  🚨 CONSTRAINTS:
  - Incorporate the metadata details naturally into the content
  - Maintain technical accuracy and industry terminology
  - Use active voice and clear, concise language
  - Include specific technical details relevant to laser cleaning applications
  - Format with proper Markdown headings (## for sections)
  - Ensure paragraphs are well-structured with topic sentences and supporting details
  
  Write ONLY the article content with proper markdown formatting. DO NOT include the frontmatter or any JSON-LD.

parameters:
  max_tokens: 2048
  temperature: 0.7