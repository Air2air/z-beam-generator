name: "Tags Generator"
description: "Generates comprehensive tags for technical articles"
version: "2.0.0"

template: |
  Generate comprehensive tags for a {article_type} article about {subject} IN THE CONTEXT OF LASER CLEANING TECHNOLOGY.

  🚨 CRITICAL CONTEXT: This is about "{subject}" as it relates to laser cleaning, not programming languages or other topics.

  🚨 CRITICAL: You MUST generate tags from ALL schema fields listed below.

  SCHEMA FIELDS FOR TAG EXTRACTION:
  {schema_template}

  🚨 MANDATORY TAG EXTRACTION FROM EACH FIELD:
  Extract 3-5 tags from EVERY field above:
  - String fields: Extract core concept tags and technical terms
  - Array fields: Extract tags from EACH array element
  - Object fields: Extract tags from ALL object properties
  - Include technical specifications (wavelengths, standards, metrics)
  - Include industry applications and use cases
  - Include safety and regulatory compliance terms
  - Include material and substrate specifics
  - Include process parameters and performance metrics

  🚨 OUTPUT FORMAT REQUIREMENTS:
  - Return ONLY tags, one per line
  - NO markdown code blocks, explanatory text, numbering, bullets
  - Kebab-case format only
  - Start immediately with tags
  - NO categories or grouping

  🚨 TAG REQUIREMENTS:
  - Extract from ALL schema fields above
  - Minimum 75+ tags total (3-5 per field × 20 fields)
  - Technical precision throughout
  - Industry-specific terminology
  - SEO-optimized for laser cleaning

  🚨 VALIDATION REQUIREMENT:
  Your output will be rejected if tags don't cover ALL schema fields.

  Generate the comprehensive tag list from ALL fields now:

parameters:
  max_tokens: 3000
  temperature: 0.7

validation:
  min_tags: 75
  max_tags: 100
  required_schema_coverage: 100
  unique_tags: true