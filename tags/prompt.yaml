name: "Tags Generator"
description: "Generates comprehensive tags for technical articles"
version: "2.0.0"

# Main prompt template for generating initial tags
template: |
  You are a specialized AI assistant for generating tags for technical articles about laser cleaning applications.

  ARTICLE TYPE: {article_type}
  SUBJECT: {subject}

  METADATA SUMMARY:
  {metadata_summary}

  INSTRUCTIONS:
  1. Generate EXACTLY 15 short, high-quality, kebab-case tags (each tag must be 1-2 words only) for this technical article.
  2. Use details from the metadata, including facility names, technologies, regulatory standards, and unique applications.
  3. Include tags that match common subjects and categories found on the laser cleaning website (e.g., equipment types, processes, industries, regulatory standards).
  4. If the article type is "region", include tags for immediately adjacent cities and the parent county (e.g., "san-carlos", "redwood-city", "foster-city", "san-mateo-county").
  5. Avoid generic tags; prefer those that would help experts, manufacturers, or enthusiasts discover this article.
  6. Format all tags in kebab-case (lowercase with hyphens between words).
  7. DO NOT include any explanations or additional text.
  8. Return ONLY a comma-separated list of tags

# New audience selection prompt template
audience_selection_template: |
  You are a specialized AI assistant for selecting the most relevant tags for technical articles.

  ARTICLE TYPE: {article_type}
  SUBJECT: {subject}

  AUDIENCE INFORMATION:
  {audience_info}

  CANDIDATE TAGS:
  {tags_list}

  TASK:
  Select EXACTLY 15 tags from the candidates that would be most relevant and valuable to the audience described above.

  SELECTION CRITERIA:
  1. Prioritize tags that match the technical interests of the primary audience
  2. Include tags relevant to the industry sectors listed
  3. Balance general and specific technical terms
  4. Choose tags that would help the audience discover this content in searches
  5. Ensure tags represent different aspects (equipment, process, application, audience)

  INSTRUCTIONS:
  - Return EXACTLY 15 tags, no more and no less
  - Format all tags in kebab-case (lowercase with hyphens)
  - Separate tags with commas
  - DO NOT include any explanations or additional text
  - DO NOT number or bullet the tags

  SELECTED TAGS (15 tags only):

parameters:
  temperature: 0.1
  max_tokens: 1000
  top_p: 0.95
  frequency_penalty: 0.0
  presence_penalty: 0.0

validation:
  min_tags: 5
  max_tags: 15