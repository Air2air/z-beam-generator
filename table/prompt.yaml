name: "Table Generator"
description: "Ensures no tables are generated in the content section for laser cleaning articles, relying on frontmatter fields."
version: "2.0.1"
template: |
  Do NOT generate any tables in the content section for the {article_type} "{subject}" in laser cleaning contexts.

  🚨 CRITICAL REQUIREMENTS:
  - Return an EMPTY string to avoid content section tables.
  - Rely on frontmatter fields (e.g., facilities, regulatoryStandards) for structured data.
  - Tables like 'Regional Facilities' or 'Regional Regulations' are REDUNDANT and must be avoided.

  🚨 CONSTRAINTS:
  - For region articles, ensure facility data is in frontmatter.facilities with California-only locations.
  - No content section output is allowed to prevent parsing overhead.

  Generate for: {article_type} = {subject}

  Example:
  ""  # Empty string

parameters:
  max_tokens: 100
  temperature: 0.0
validation:
  required_output: ""