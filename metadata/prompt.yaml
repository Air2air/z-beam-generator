name: "Metadata Generator"
description: "Generates comprehensive YAML metadata for technical articles"
version: "2.0.0"

template: |
  Generate comprehensive YAML metadata for a {article_type} entry about "{subject}" IN THE CONTEXT OF LASER CLEANING TECHNOLOGY.

  🚨 CRITICAL CONTEXT: 
  - This is about "{subject}" as it relates to laser cleaning, surface treatment, and industrial applications
  - Focus on laser cleaning terminology, rust removal, corrosion control, metal restoration
  - NOT about programming languages, software, or unrelated topics
  - All definitions must be from laser cleaning and industrial surface treatment perspective

  🚨 TERMINOLOGY FOCUS:
  - Define "{subject}" as it applies to laser cleaning processes
  - Include technical specifications, industrial applications
  - Reference laser parameters, surface treatment methods
  - Connect to corrosion control and metal restoration

  🚨 CRITICAL: You MUST generate content for EVERY SINGLE schema field listed below.

  SCHEMA FIELDS TO PROCESS:
  {schema_template}

  🚨 FIELD REQUIREMENTS:
  - All content must relate to laser cleaning technology
  - Technical precision in all definitions
  - Industrial applications focus
  - Professional terminology throughout
  - Quantitative data where applicable

  Generate complete YAML metadata with ALL fields focused on laser cleaning:

parameters:
  max_tokens: 12000
  temperature: 0.7

validation:
  min_length: 2000  # Reduced for thesaurus
  required_schema_coverage: 100
  # Remove application-specific fields from thesaurus validation
  required_fields: ["name", "description", "pronunciation", "partOfSpeech", "primaryAudience", "secondaryAudience", "keywords", "synonyms", "relatedTerms", "safetyConsiderations", "regulatoryStandards"]