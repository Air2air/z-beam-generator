name: "Metadata Generator"
description: "Generates concise YAML metadata for all article types"
version: "2.2.0"

template: |
  Generate CONCISE AND EFFICIENT metadata for the {article_type} "{subject}" in laser cleaning contexts.
  
  🚨 CRITICAL LENGTH REQUIREMENT:
  - YOU MUST GENERATE BETWEEN 2,000-3,000 CHARACTERS of focused technical metadata
  - This is a HARD REQUIREMENT - longer responses will be rejected automatically
  - Create BRIEF and TARGETED content for EACH field in the schema
  - Add FEWER ITEMS to arrays (5-10 items for simple arrays like keywords)
  - For complex arrays with name/description fields, include AT MOST 4-6 ITEMS
  - Write SHORTER DESCRIPTIONS for each field - aim for 100-150 characters per description
  - Include ESSENTIAL TECHNICAL DETAILS only
  
  🚨 IMPORTANT CONSTRAINTS:
  - If generating a region article, ONLY use locations within California, USA
  - For region articles, the "countries" field MUST ONLY contain "United States" - no other countries
  - All geographic data must reference California locations exclusively
  - Any manufacturing centers, organizations, or facilities must be physically located in California
  - ALWAYS use "https://www.z-beam.com" for ALL website URLs (NEVER use example.com or any other domain)
  
  🚨 GEOGRAPHIC CONTEXT REQUIREMENTS:
  - For region articles, ALWAYS include:
    1. The specific county where the city is located (e.g., "Santa Clara County")
    2. At least 2 immediately adjacent/neighboring cities (must be actual neighboring cities)
    3. The broader region of California (e.g., "Bay Area", "Silicon Valley", "Southern California")
    4. Explicitly state "California" as the state
  - Example: "Mountain View is located in Santa Clara County, California, in the heart of Silicon Valley. 
    It borders Palo Alto and Sunnyvale."
  
  🚨 URL FORMATTING RULES:
  - ALL URLs must use the www.z-beam.com domain
  - Format: https://www.z-beam.com/[subject-with-dashes]-laser-cleaning
  - Example: https://www.z-beam.com/mountain-view-laser-cleaning or https://www.z-beam.com/aluminum-laser-cleaning
  - NEVER use example.com, placeholder.com, or any domain without the "www." prefix
  - ALWAYS include "www." in the domain (use https://www.z-beam.com NOT https://z-beam.com)
  - DO NOT include article type in the URL (e.g., NO /regions/ or /materials/ path segments)
  
  🚨 CRITICAL ARRAY FORMATTING RULES:
  - Simple arrays (like keywords, countries, etc.) must use this format:
    keywords:
      - "first keyword"
      - "second keyword"
      - "third keyword"
    
  - Complex arrays with objects must use this format:
    arrayName:
      - name: "Item name"
        description: "Brief item description in 1-2 sentences."
        property: "Another property"
      - name: "Second item name"
        description: "Short explanation with key technical specifics."
        property: "Another property"
  
  Generate YAML for: {article_type} = {subject}
  
  Required fields:
  {schema_template}
  
  🚨 CONTENT EXPANSION REQUIREMENTS:
  1. Geographic data must include precise coordinates and basic context when applicable
  2. Manufacturing centers must include short facility descriptions (50-75 words each) when applicable
  3. Regulatory standards must include key code references and brief notes when applicable
  4. Include at least 10-15 focused keywords with technical specificity
  5. Description must be succinct (150-200 words) covering core technical aspects
  6. For array fields with descriptions, write 50-100 words per description
  7. For challenges/outcomes sections, provide brief technical explanations when applicable
  8. Include essential equipment parameters and specifications when applicable


parameters:
  max_tokens: 5000
  temperature: 0.7

validation:
  min_length: 2000
  required_schema_coverage: 100
  required_fields: ["name", "description", "keywords"]