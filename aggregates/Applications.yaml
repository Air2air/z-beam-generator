      damages historic fabric. Q-switched Nd:YAG and fiber laser systems operate at low fluences tuned to each stone type,
      selectively removing black sulfation crusts and graffiti from marble, limestone, granite, and sandstone facades documented
      in European cathedral restoration projects. UNESCO and ICOMOS guidelines on reversible conservation methods increasingly
      recommend laser as the least-invasive option where hydrothermal cleaning is inadequate. Operators must manage lead paint
      vapor and silica dust extraction, and reflectometry-guided feedback systems prevent over-ablation on polished or carved
      surfaces. Applications range from national monument restoration to contemporary architectural concrete maintenance.
