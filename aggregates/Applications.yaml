      assets including gas and steam turbines benefit from oxide scale removal on
      Inconel and nickel superalloy blades prior to thermal barrier recoating. NRC
      and IAEA regulatory frameworks govern radioactive surface operations, requiring
      ALARA-certified procedures. Offshore wind turbine tower cleaning represents
      a newer growth segment within this domain.
